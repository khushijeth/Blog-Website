{% extend "base.html" %}

{% block title %}
{{ blog.title }}
{% endlock %}

{% block content %}

<div class="detail-card">
    {% if blog.image %}
        <img src="{{blog.image.url}} alt={{blog.title}}">
    {% endif %}
    <h1>{{ blog.title }}</h1>

    <p class="author">
        By {{ blog.author }}
    </p>

    <p class="date">
        {{ blog.create_at }}
    </p>

    <hr>

    <p class="content">
        {{ blog.eontent }}
    </p>

</div>

{% endblock %}
