{% extends "base.html" %}

{% block title %}
Create Blog
{% endblock %}

{% block content %}

<div class="form-container">

    <h1 class="form-heading">Create New Blog</h1>

    <form method="POST" enctype="multipart/form-data">

        {% csrf_token %}

        <div class="form-card">

            <div class="form-group">
                <label>Title</label>
                {{ form.title }}
            </div>

            <div class="form-group">
                <label>Author</label>
                {{ form.author }}
            </div>

            <div class="form-group">
                <label>Image</label>
                {{ form.image }}
            </div>

            <div class="form-group">
                <label>Content</label>
                {{ form.content }}
            </div>

            <button type="submit" class="button">
                Publish Blog
            </button>

        </div>

    </form>

</div>

{% endblock %}
