{% extends "base.html" %}
{% block title %}
Register
{% endblock  %}

{% block content %}
<div class="form-container">
    <h1 class="Form-heading">Create Account</h1>

    <div class="form-card">
        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label>Username</label>
                {{ form.username }}
            </div>

            <div class="mb-3">
                <label>Email</label>
                {{ form.email }}
            </div>

            <div class="mb-3">
                <label>Password</label>
                {{ form.password1 }}
            </div>

            <div class="mb-3">
                <label>Confirm Password</label>
                {{ form.password2 }}
            </div>

            <button class="btn btn-success">
                Register
            </button>
        </form>
    </div>
</div>
{% endblock  %}
