<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% block title %}
            Blog Website
        {% endblock %}
    </title>

    {% load static %}

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

    <!-- Navbar -->
    <nav>
        <a href="/">Home</a>
        <a href="#">Blogs</a>
        <a href="#">Categories</a>
        <a href="#">About</a>
        <a href="#">Contact</a>

        <span style="float:right;">
            <a href="#">Login</a>
            <a href="#">Register</a>
        </span>
    </nav>

    <hr>

    <!-- Main Content -->
    <main>

        {% block content %}

        {% endblock %}

    </main>

    <hr>

    <!-- Footer -->
    <footer>

        <p>© 2026 My Blog Website</p>

    </footer>

    <script src="{% static 'js/script.js' %}"></script>

</body>
</html>
